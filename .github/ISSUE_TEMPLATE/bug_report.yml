name: Bug Report
description: Reportar comportamento incorreto do projeto
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## Aviso: repositório arquivado
        Este repositório não está mais ativo e permanece público apenas para estudo.
        Não há garantia de resposta, revisão ou correção.
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar. Preencha os campos abaixo para facilitar o diagnóstico.
  - type: input
    id: summary
    attributes:
      label: Resumo
      description: Descreva o problema em uma frase
      placeholder: Ex.: Saída da classe StairClimber está incorreta para n=0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Execute...
        2. Informe...
        3. Veja o erro...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Ambiente
      placeholder: |
        OS:
        Java:
        Shell:
    validations:
      required: true
