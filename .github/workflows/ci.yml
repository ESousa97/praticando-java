name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['21']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Lint
        run: bash scripts/tasks.sh lint

      - name: Test
        run: bash scripts/tasks.sh test

      - name: Build
        run: bash scripts/tasks.sh build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-out
          path: out/
